name: CI Pipeline

on:
  push:
    branches: ['*']
  pull_request:
    branches: [main]

jobs:
  install:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '18'
      - name: Install dependencies
        run: npm install   # BUG 1 — should be npm ci

  test:
    runs-on: ubuntu-latest
    # BUG 2 — missing needs: install, so test runs in parallel with install
    # BUG 3 — no checkout or npm ci step, so node_modules is empty on this fresh machine
    steps:
      - name: Run tests
        run: npm test
